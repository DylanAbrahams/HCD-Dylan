<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indoor Navigation</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <header>

    </header>
    <main>
        <section>
            <h1>Supermarkt Navigatie</h1>
            <p id="productInstruction">Kies een product om de route te zien en te horen.</p>
            <button onclick="selectProduct('melk')" aria-label="Selecteer product melk">Melk</button>
            <button onclick="selectProduct('brood')" aria-label="Selecteer product brood">Brood</button>
            <button onclick="selectProduct('cola')" aria-label="Selecteer product cola">Cola</button>
        </section>

        <section>
            <h2>Volledige route:</h2>
            <ul id="routeList" aria-live="polite"></ul>
        </section>

        <section>
            <h3>Bewegen:</h3>
            <button onclick="move('left')">Beweeg een stap naar links</button>
            <button onclick="move('up')">Beweeg een stap vooruit</button>
            <button onclick="move('down')">Beweeg een stap achteruit</button>
            <button onclick="move('right')">Beweeg een stap naar rechts</button>
        </section>

        <section>
            <h3 aria-hidden="true">Denkbeeldige Kaart:</h3>
            <div id="grid" aria-hidden="true"></div>
            <button onclick="showLocation()">Druk deze knop om je huidige positie te horen</button>
        </section>

        <p id="status" aria-live="assertive"></p>

    </main>
    <footer>

    </footer>
    <script src="scripts/script.js"></script>
</body>

</html>
